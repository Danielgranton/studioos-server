spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: studioos-server

  # ─── DATABASE ───
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studioos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─── EMAIL (SMTP) ───
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ─── ASYNC (for email/sms sending) ───
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10

  # ─── JPA ───
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway handles schema, Hibernate just validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # ─── FLYWAY ───
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ─── WEBSOCKET ───
  websocket:
    path: /ws

  # ─── JACKSON ───
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # ─── REDIS ───
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

# ─── SERVER ───
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ─── JWT ───
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}        # 24 hours in ms
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days in ms

internal:
  service:
    api-key: ${INTERNAL_SERVICE_API_KEY:}

media:
  service:
    host: ${MEDIA_SERVICE_HOST:localhost}
    port: ${MEDIA_SERVICE_PORT:50051}
  callback:
    grpc:
      enabled: ${MEDIA_CALLBACK_GRPC_ENABLED:true}
      host: ${MEDIA_CALLBACK_GRPC_HOST:0.0.0.0}
      port: ${MEDIA_CALLBACK_GRPC_PORT:50052}

storage:
  s3:
    enabled: ${S3_ENABLED:false}
    region: ${AWS_REGION:eu-north-1}
    access-key-id: ${AWS_ACCESS_KEY:}
    secret-access-key: ${AWS_SECRET_KEY:}
    bucket: ${AWS_BUCKET_NAME:}
    endpoint-url: ${AWS_S3_ENDPOINT_URL:}
    path-style-access: ${AWS_S3_PATH_STYLE:false}
    
# ─── MPESA (Daraja API) ───
mpesa:
  base-url: ${MPESA_BASE_URL:https://sandbox.safaricom.co.ke}
  consumer-key: ${MPESA_CONSUMER_KEY}
  consumer-secret: ${MPESA_CONSUMER_SECRET}
  shortcode: ${MPESA_SHORTCODE}
  passkey: ${MPESA_PASSKEY}
  callback-url: ${MPESA_CALLBACK_URL}
  timeout-url: ${MPESA_TIMEOUT_URL}

# ─── AFRICA'S TALKING ───
africastalking:
  username: ${AFRICASTALKING_USERNAME:${AT_USERNAME:}}
  apikey: ${AFRICASTALKING_API_KEY:${AT_API_KEY:}}
  sender-id: ${AFRICASTALKING_SENDER_ID:${AT_SENDER_ID:}}

# ─── PLATFORM ───
platform:
  commission-rate: ${COMMISSION_RATE:0.10}      # 10% default
  currency: KES
  mixing-deadline-days: 7

opensearch:
  host: ${OPENSEARCH_HOST}
  port: ${OPENSEARCH_PORT}

search:
  indexing:
    init-on-startup: true

# ─── ACTUATOR ───
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ─── LOGGING ───
logging:
  level:
    com.studioos: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# ─── DEV PROFILE ───
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  logging:
    level:
      com.studioos: DEBUG
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql: TRACE

---
# ─── PROD PROFILE ───
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
  logging:
    level:
      com.studioos: INFO
      org.springframework.security: WARN
